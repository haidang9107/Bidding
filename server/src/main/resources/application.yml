spring:
  datasource:
    # Ưu tiên DB_URL hoàn chỉnh, nếu không có sẽ tự lắp ghép từ các biến lẻ
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bidding_db}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  application:
    name: bidding-server
server:
  port: ${SERVER_PORT:8888}
